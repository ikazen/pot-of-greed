services:
  api:
    image: registry.internal:5000/pot-of-greed:${IMAGE_TAG:-latest}
    build: .
    container_name: pot-of-greed-api
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; socket.create_connection(('localhost', 8000))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexus

networks:
  nexus:
    external: true
