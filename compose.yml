services:
  api:
    image: registry.internal:5000/pot-of-greed:${IMAGE_TAG:-latest}
    build: .
    container_name: pot-of-greed-api
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; socket.create_connection(('localhost', 8000))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexus

  ui:
    image: registry.internal:5000/pot-of-greed-ui:${IMAGE_TAG:-latest}
    build:
      context: ui
    container_name: pot-of-greed-ui
    environment:
      API_BASE_URL: http://pot-of-greed-api:8000
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET}
      CHAINLIT_DB_DSN: ${CHAINLIT_DB_DSN}
    restart: unless-stopped
    networks:
      - nexus

networks:
  nexus:
    external: true
